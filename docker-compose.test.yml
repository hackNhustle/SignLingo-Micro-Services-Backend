version: '3.8'

services:
  auth-service:
    build: ./SIGN-LINGO-AUTH
    container_name: test-auth
    environment:
      - MONGO_URI=mongodb://mongo:27017
      - MONGO_TLS=False
      - JWT_SECRET_KEY=your_secret_key_here_change_this_in_production
    command: uvicorn main:app --host 0.0.0.0 --port 5002
    ports:
      - "5002:5002"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - test-mesh

  content-service:
    build: ./SIGN-LINGO-CONTENT
    container_name: test-content
    environment:
      - MONGO_URI=mongodb://mongo:27017
      - MONGO_TLS=False
      - JWT_SECRET_KEY=your_secret_key_here_change_this_in_production
    command: uvicorn main:app --host 0.0.0.0 --port 5003
    ports:
      - "5003:5003"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - test-mesh

  practice-service:
    build: ./SIGN-LINGO-PRACTICE
    container_name: test-practice
    environment:
      - MONGO_URI=mongodb://mongo:27017
      - MONGO_TLS=False
      - JWT_SECRET_KEY=your_secret_key_here_change_this_in_production
    command: uvicorn main:app --host 0.0.0.0 --port 5004
    ports:
      - "5004:5004"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - test-mesh

  convert-service:
    build: ./SIGN-LINGO-CONVERT
    container_name: test-convert
    command: uvicorn app.main:app --host 0.0.0.0 --port 5005
    ports:
      - "5005:5005"
    networks:
      - test-mesh

  gateway:
    build: ./SIGN-LINGO-GATEWAY
    container_name: test-gateway
    environment:
      - AUTH_SERVICE_URL=http://auth-service:5002
      - CONTENT_SERVICE_URL=http://content-service:5003
      - PRACTICE_SERVICE_URL=http://practice-service:5004
      - CONVERT_SERVICE_URL=http://convert-service:5005
      - JWT_SECRET_KEY=your_secret_key_here_change_this_in_production
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    depends_on:
      - auth-service
      - content-service
      - practice-service
      - convert-service
    networks:
      - test-mesh

  mongo:
    image: mongo:6.0
    container_name: test-mongo
    ports:
      - "27017:27017"
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - test-mesh

networks:
  test-mesh:
